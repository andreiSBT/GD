<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#001444" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <title>Geometry Dash</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: #000;
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        /* Prevent long-press context menu on mobile */
        -webkit-touch-callout: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="account-overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,20,0.92); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); z-index:100; justify-content:center; align-items:center;">
      <div class="acc-panel">
        <h2 id="account-title">ACCOUNT</h2>
        <div id="account-logged-out">
          <!-- Login form -->
          <div id="acc-login-form">
            <input id="acc-login-user" class="acc-input" type="text" placeholder="Username" autocomplete="username" maxlength="50">
            <input id="acc-login-pass" class="acc-input" type="password" placeholder="Password" autocomplete="current-password" maxlength="30">
            <div id="acc-error" class="acc-error"></div>
            <button id="acc-login" class="acc-btn acc-btn-green">LOG IN</button>
            <p id="acc-show-register" class="acc-link" style="color:#4488CC;">Don't have an account? Register</p>
          </div>
          <!-- Register form -->
          <div id="acc-register-form" style="display:none;">
            <input id="acc-reg-username" class="acc-input" type="text" placeholder="Username" autocomplete="username" maxlength="20">
            <input id="acc-reg-pass" class="acc-input" type="password" placeholder="Password" autocomplete="new-password" maxlength="30">
            <input id="acc-reg-pass2" class="acc-input" type="password" placeholder="Confirm Password" autocomplete="new-password" maxlength="30">
            <div id="acc-reg-error" class="acc-error"></div>
            <button id="acc-register" class="acc-btn acc-btn-blue">REGISTER</button>
            <p id="acc-show-login" class="acc-link" style="color:#00C864;">Already have an account? Log in</p>
          </div>
        </div>
        <div id="account-logged-in" style="display:none;">
          <div class="acc-avatar">&#9733;</div>
          <p style="color:#667788; font-size:13px; margin-bottom:4px; letter-spacing:2px; text-transform:uppercase;">Logged in as</p>
          <p id="acc-display-name" class="acc-username"></p>
          <div class="acc-sync-badge">&#x2601; SYNCED ACROSS DEVICES</div>
          <button id="acc-logout" class="acc-btn acc-btn-red">LOG OUT</button>
        </div>
        <button id="acc-close" class="acc-btn acc-btn-back">BACK</button>
      </div>
    </div>
    <style>
      .acc-panel {
        background: linear-gradient(180deg, #0a0e1a 0%, #111828 50%, #0a0e1a 100%);
        border: 1px solid rgba(0,200,255,0.15);
        border-radius: 20px;
        padding: 36px 32px 28px;
        width: 90%;
        max-width: 380px;
        text-align: center;
        font-family: monospace;
        box-shadow: 0 0 40px rgba(0,100,200,0.15), 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        position: relative;
      }
      .acc-panel h2 {
        color: #00C8FF;
        font-size: 28px;
        margin-bottom: 24px;
        letter-spacing: 4px;
        text-shadow: 0 0 20px rgba(0,200,255,0.5), 0 0 40px rgba(0,200,255,0.2);
      }
      .acc-input {
        width: 100%;
        padding: 14px 16px;
        margin-bottom: 14px;
        background: rgba(0,0,0,0.4);
        border: 1px solid rgba(255,255,255,0.1);
        color: #EEE;
        font-size: 15px;
        font-family: monospace;
        letter-spacing: 0.5px;
        border-radius: 10px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .acc-input:focus {
        border-color: rgba(0,200,255,0.4);
        box-shadow: 0 0 12px rgba(0,200,255,0.15), inset 0 0 8px rgba(0,200,255,0.05);
      }
      .acc-input::placeholder {
        color: #445566;
        font-size: 14px;
      }
      .acc-error {
        color: #FF4444;
        font-size: 13px;
        margin-bottom: 12px;
        min-height: 18px;
        text-shadow: 0 0 8px rgba(255,50,50,0.3);
      }
      .acc-btn {
        width: 100%;
        padding: 14px;
        margin-bottom: 10px;
        border: none;
        color: #FFF;
        font-size: 16px;
        font-family: monospace;
        font-weight: bold;
        letter-spacing: 2px;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
        position: relative;
        overflow: hidden;
      }
      .acc-btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.15);
      }
      .acc-btn:active {
        transform: translateY(1px);
        filter: brightness(0.95);
      }
      .acc-btn-green {
        background: linear-gradient(180deg, #00DD6E 0%, #00A050 100%);
        box-shadow: 0 4px 16px rgba(0,200,100,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
      }
      .acc-btn-green:hover { box-shadow: 0 6px 24px rgba(0,200,100,0.4), inset 0 1px 0 rgba(255,255,255,0.15); }
      .acc-btn-blue {
        background: linear-gradient(180deg, #5599DD 0%, #3366AA 100%);
        box-shadow: 0 4px 16px rgba(50,100,200,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
      }
      .acc-btn-blue:hover { box-shadow: 0 6px 24px rgba(50,100,200,0.4), inset 0 1px 0 rgba(255,255,255,0.15); }
      .acc-btn-red {
        background: linear-gradient(180deg, #DD4444 0%, #AA2222 100%);
        box-shadow: 0 4px 16px rgba(200,50,50,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
      }
      .acc-btn-red:hover { box-shadow: 0 6px 24px rgba(200,50,50,0.4), inset 0 1px 0 rgba(255,255,255,0.15); }
      .acc-btn-back {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.1);
        color: #778899;
        letter-spacing: 3px;
        margin-top: 6px;
      }
      .acc-btn-back:hover {
        background: rgba(255,255,255,0.1);
        color: #AAB;
      }
      .acc-link {
        font-size: 13px;
        margin-top: 10px;
        margin-bottom: 4px;
        cursor: pointer;
        text-decoration: none;
        opacity: 0.7;
        transition: opacity 0.2s;
      }
      .acc-link:hover { opacity: 1; text-decoration: underline; }
      .acc-avatar {
        width: 60px;
        height: 60px;
        margin: 0 auto 16px;
        background: linear-gradient(135deg, #00C8FF 0%, #0066CC 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: #FFF;
        box-shadow: 0 0 20px rgba(0,200,255,0.3);
      }
      .acc-username {
        color: #00C8FF;
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 16px;
        text-shadow: 0 0 15px rgba(0,200,255,0.4);
        letter-spacing: 1px;
      }
      .acc-sync-badge {
        display: inline-block;
        background: rgba(0,200,255,0.08);
        border: 1px solid rgba(0,200,255,0.15);
        border-radius: 20px;
        padding: 6px 16px;
        color: #4488AA;
        font-size: 11px;
        letter-spacing: 1px;
        margin-bottom: 24px;
      }
      /* Mobile polish */
      @media (max-width: 600px), (max-height: 450px) {
        .acc-panel {
          padding: 24px 20px 20px;
          max-width: 95%;
          border-radius: 16px;
          max-height: 90dvh;
          overflow-y: auto;
        }
        .acc-panel h2 { font-size: 22px; margin-bottom: 16px; }
        .acc-input { font-size: 16px; padding: 16px; margin-bottom: 12px; }
        .acc-input::placeholder { font-size: 15px; }
        .acc-error { font-size: 14px; }
        .acc-btn { padding: 16px; font-size: 17px; min-height: 50px; }
        .acc-link { font-size: 15px; padding: 8px 0; }
        .acc-avatar { width: 50px; height: 50px; font-size: 24px; }
        .acc-username { font-size: 20px; }
        .acc-sync-badge { font-size: 12px; padding: 8px 14px; }
      }
    </style>
    <!-- Custom color trigger editor overlay -->
    <div id="color-editor-overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,20,0.92); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); z-index:100; justify-content:center; align-items:center; touch-action:auto; -webkit-user-select:auto; user-select:auto;">
      <div class="acc-panel" style="max-width:420px; max-height:90dvh; overflow-y:auto;">
        <h2 style="color:#FF66AA; font-size:22px; margin-bottom:18px; letter-spacing:3px; text-shadow:0 0 20px rgba(255,102,170,0.5);">CUSTOM COLOR</h2>
        <div id="ce-fields" style="display:grid; grid-template-columns:1fr 1fr; gap:10px 14px; margin-bottom:18px;"></div>
        <div style="margin-bottom:18px; text-align:left;">
          <label style="color:#99AABB; font-size:13px; letter-spacing:1px; display:block; margin-bottom:6px;">TRANSITION DURATION</label>
          <div style="display:flex; align-items:center; gap:10px;">
            <input id="ce-duration" type="range" min="0.1" max="5" step="0.1" value="0.6" style="flex:1; accent-color:#FF66AA;">
            <span id="ce-duration-val" style="color:#FF66AA; font-size:15px; font-family:monospace; min-width:40px;">0.6s</span>
          </div>
        </div>
        <button id="ce-ok" class="acc-btn" style="background:linear-gradient(180deg,#FF66AA 0%,#CC3388 100%); box-shadow:0 4px 16px rgba(255,100,170,0.3); margin-bottom:8px;">OK</button>
        <button id="ce-cancel" class="acc-btn acc-btn-back">CANCEL</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
  </body>
</html>
